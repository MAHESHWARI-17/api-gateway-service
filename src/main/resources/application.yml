server:
  port: 8090

spring:
  application:
    name: apigateway

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:3000"
              - "http://localhost:3001"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600

      routes:
        - id: accountidentityservice
          uri: lb://ACCOUNTIDENTITYSERVICE
          predicates:
            - Path=/auth/**,/accounts/**

        - id: adminservice
          uri: lb://ACCOUNTIDENTITYSERVICE
          predicates:
            - Path=/admin/**

        - id: complianceservice
          uri: lb://ACCOUNTIDENTITYSERVICE
          predicates:
            - Path=/compliance/**

        - id: transactionservice
          uri: lb://TRANSACTIONSERVICE
          predicates:
            - Path=/transactions/**

        - id: auditservice
          uri: lb://AUDITSERVICE
          predicates:
            - Path=/audit/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}